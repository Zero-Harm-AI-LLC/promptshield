name: "PromptShield"
description: "Detect prompt injection, PII leaks, and unsafe LLM usage in pull requests"
author: "ScalApps"
branding:
  icon: "shield"
  color: "blue"

inputs:
  base-ref:
    description: "Base git ref to diff against (for example: origin/main). Required unless diff is set."
    required: false
    default: ""
  diff:
    description: "Optional path to a pre-generated diff file."
    required: false
    default: ""
  output-format:
    description: "Output mode: json, github, markdown, or sarif."
    required: false
    default: "json"
  schema:
    description: "Emit schema-wrapped JSON payload when output-format=json."
    required: false
    default: "false"
  max-findings:
    description: "Optional maximum findings count. Highest-severity findings are kept first."
    required: false
    default: ""
  github-actions:
    description: "Emit GitHub Actions annotations (equivalent to output-format: github)."
    required: false
    default: "false"
  python-version:
    description: "Python version used by the action."
    required: false
    default: "3.11"
  output-file:
    description: "Path to write structured findings output."
    required: false
    default: ""
  fail-on:
    description: "Minimum severity level that triggers a non-zero exit code (high, medium, low, any, never)."
    required: false
    default: "any"

runs:
  using: "composite"
  steps:
    - name: Validate action inputs
      shell: bash
      run: |
        case "${{ inputs.output-format }}" in
          json|github|markdown|sarif) ;;
          *)
            echo "::error title=InvalidOutputFormat::output-format must be one of: json, github, markdown, sarif"
            exit 1
            ;;
        esac

        if [ "${{ inputs.schema }}" = "true" ] && [ "${{ inputs.output-format }}" != "json" ]; then
          echo "::error title=InvalidInputCombination::schema=true requires output-format=json"
          exit 1
        fi

        if [ -n "${{ inputs.max-findings }}" ] && ! [[ "${{ inputs.max-findings }}" =~ ^[0-9]+$ ]]; then
          echo "::error title=InvalidInputCombination::max-findings must be a non-negative integer"
          exit 1
        fi

        case "${{ inputs.fail-on }}" in
          high|medium|low|any|never) ;;
          *)
            echo "::error title=InvalidInputCombination::fail-on must be one of: high, medium, low, any, never"
            exit 1
            ;;
        esac

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        check-latest: true

    - name: Install PromptShield dependencies
      shell: bash
      run: |
        if [ -f "${{ github.action_path }}/requirements-lock.txt" ]; then
          python3 -m pip install --disable-pip-version-check --no-input --require-hashes -r "${{ github.action_path }}/requirements-lock.txt"
        else
          python3 -m pip install --disable-pip-version-check --no-input -r "${{ github.action_path }}/requirements.txt"
        fi

    - name: Run PromptShield
      id: scan
      shell: bash
      run: |
        args=()

        if [ -n "${{ inputs.diff }}" ]; then
          args+=(--diff "${{ inputs.diff }}")
        elif [ -n "${{ inputs.base-ref }}" ]; then
          args+=(--base "${{ inputs.base-ref }}")
        elif [ -n "${{ github.base_ref }}" ]; then
          args+=(--base "origin/${{ github.base_ref }}")
        else
          args+=(--base "origin/main")
        fi

        args+=(--output-format "${{ inputs.output-format }}")

        if [ "${{ inputs.github-actions }}" = "true" ]; then
          args+=(--github-actions)
        fi

        if [ "${{ inputs.schema }}" = "true" ]; then
          args+=(--schema)
        fi

        if [ -n "${{ inputs.max-findings }}" ]; then
          args+=(--max-findings "${{ inputs.max-findings }}")
        fi

        args+=(--fail-on "${{ inputs.fail-on }}")

        output_file="${{ inputs.output-file }}"
        if [ -z "$output_file" ]; then
          output_file="${RUNNER_TEMP}/promptshield-findings.json"
        fi

        args+=(--output-file "$output_file")

        python3 "${{ github.action_path }}/scan_pr.py" "${args[@]}"
        echo "findings-path=$output_file" >> "${GITHUB_OUTPUT}"

outputs:
  findings-path:
    description: "Path to the output file generated by PromptShield."
    value: ${{ steps.scan.outputs.findings-path }}
