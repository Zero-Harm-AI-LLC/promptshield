name: Validate PromptShield action

on:
  push:
  pull_request:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run actionlint
        run: |
          docker run --rm -w /repo -v "${{ github.workspace }}:/repo" rhysd/actionlint:latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest zero-harm-ai-detectors

      - name: Run tests
        run: pytest tests/ -v
