name: Validate PromptShield action

on:
  push:
  pull_request:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        run: |
          docker run --rm -w /repo -v "${{ github.workspace }}:/repo" rhysd/actionlint:latest
