name: Validate PromptShield action

on:
  push:
    paths:
      - "action.yml"
      - ".github/workflows/*.yml"
  pull_request:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" rhysd/actionlint:latest /repo
