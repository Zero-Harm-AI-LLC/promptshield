name: PromptShield Review (sample)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run PromptShield
        id: promptshield
        uses: ./
        with:
          base-ref: origin/${{ github.base_ref || 'main' }}
          output-format: json
          output-file: ${{ runner.temp }}/promptshield-findings.json
          fail-on: never
          max-findings: 25

      - name: Post or update PR review summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- promptshield-inline-review -->";
            const findingsPath = process.env.PROMPTSHIELD_FINDINGS;

            if (!context.payload.pull_request) {
              core.info("No pull request context available; skipping PR review comments.");
              return;
            }

            const findings = JSON.parse(fs.readFileSync(findingsPath, "utf8"));
            const pull = context.payload.pull_request;
            const headSha = pull.head.sha;

            function summarizeFinding(finding) {
              const location = `${finding.file || "unknown"}:${finding.line || 1}`;
              const detector = finding.source_summary ? ` Detector match: ${finding.source_summary}.` : "";
              return `- \`${(finding.severity || "unknown").toUpperCase()}\` \`${finding.type}\` at \`${location}\` - ${finding.title}.${detector}`;
            }

            const reviewBody = findings.length
              ? [
                  marker,
                  "",
                  "## PromptShield Review",
                  "",
                  findings.map(summarizeFinding).join("\n"),
                ].join("\n")
              : [
                  marker,
                  "",
                  "## PromptShield Review",
                  "",
                  "No AI security findings detected in the current pull request diff.",
                ].join("\n");

            const existingComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pull.number,
              per_page: 100,
            });

            for (const comment of existingComments) {
              if (comment.user?.type === "Bot" && comment.body?.includes(marker)) {
                await github.rest.pulls.deleteReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            const inlineComments = findings
              .filter((finding) => finding.file && finding.line)
              .slice(0, 10)
              .map((finding) => {
                const detector = finding.source_summary ? `\n\nDetector match: ${finding.source_summary}` : "";
                return {
                  path: finding.file,
                  line: finding.line,
                  side: "RIGHT",
                  body: [
                    marker,
                    `**${(finding.severity || "unknown").toUpperCase()}** \`${finding.type}\``,
                    "",
                    finding.title,
                    detector,
                  ].join("\n"),
                };
              });

            if (!findings.length) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pull.number,
                commit_id: headSha,
                event: "COMMENT",
                body: reviewBody,
              });
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pull.number,
              commit_id: headSha,
              event: "COMMENT",
              body: reviewBody,
              comments: inlineComments,
            });
        env:
          PROMPTSHIELD_FINDINGS: ${{ runner.temp }}/promptshield-findings.json

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptshield-findings
          path: ${{ runner.temp }}/promptshield-findings.json
