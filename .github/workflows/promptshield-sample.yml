name: PromptShield Review (sample)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run PromptShield
        id: promptshield
        uses: ./
        with:
          base-ref: origin/${{ github.base_ref || 'main' }}
          output-format: json
          output-file: ${{ runner.temp }}/promptshield-findings.json
          fail-on: never
          max-findings: 25

      - name: Post or update PR review summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- promptshield-review -->";
            if (!context.issue.number) {
              core.info("No pull request context available; skipping PR review summary.");
              return;
            }
            const findingsPath = process.env.PROMPTSHIELD_FINDINGS;
            const findings = JSON.parse(fs.readFileSync(findingsPath, "utf8"));

            function summarizeFinding(finding) {
              const location = `${finding.file || "unknown"}:${finding.line || 1}`;
              const detector = finding.source_summary ? ` Detector match: ${finding.source_summary}.` : "";
              return `- \`${(finding.severity || "unknown").toUpperCase()}\` \`${finding.type}\` at \`${location}\` - ${finding.title}.${detector}`;
            }

            const body = findings.length
              ? [
                  marker,
                  "",
                  "## PromptShield Review",
                  "",
                  findings.map(summarizeFinding).join("\n"),
                ].join("\n")
              : [
                  marker,
                  "",
                  "## PromptShield Review",
                  "",
                  "No AI security findings detected in the current pull request diff.",
                ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          PROMPTSHIELD_FINDINGS: ${{ runner.temp }}/promptshield-findings.json

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptshield-findings
          path: ${{ runner.temp }}/promptshield-findings.json
